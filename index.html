<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSSFiles/RegistrationForm.css">
    <script src="./JSFiles/RegisrationForm.js" defer></script>
    <title>Registration Form</title>
</head>

<body>
    <div id="container">
        <div>
            <!-- put h2 in div to make it float on right or left -->
            <h2>Student Registration Form</h2>
        </div>

        <form id="form" action="../HtmlFiles/welcomePage.html" method="get">
            <div class="labelInput">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required>
            </div>

            <div class="labelInput">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required>
            </div>

            <div class="labelInput">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="it should contain @..." required>
            </div>

            <div class="labelInput">
                <label for="mobile">Mobile:</label>
                <input type="text" id="mobile" name="mobile" placeholder="only 10 digits are allowed" required>
            </div>

            <div class="gender">
                <p id="genderLabel">Gender:</p>
                <div id="options">
                    <div id="genderMale">
                        <input type="radio" id="male" name="gender" value="male" checked>
                        <label for="male">Male</label>
                    </div>
                    <div id="genderFemale">
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </div>
                </div>
            </div>

            <div class="labelInput">
                <label for="dob">Date Of Birth:</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="labelInput">
                <label for="address">Address:</label>
                <textarea name="address" id="address" rows="10" cols="50" required>Enter your text here...</textarea>
            </div>


            <div class="labelInput">
                <label for="City">City:</label>
                <input type="text" id="City" name="City" placeholder="Write Your City" required>
            </div>

            <div class="labelInput">
                <label for="areaPIN">Area PIN:</label>
                <input type="text" id="areaPIN" name="areaPIN" placeholder="Write Your area PIN" required>
            </div>

            <div class="labelInput">
                <label for="state">State:</label>
                <input type="text" id="state" name="state" placeholder="Write Your State" required>
            </div>

            <div id="qualification">
                <label>Qualification:</label>
                <select id="selectElement" required>
                    <option>Select Qualification</option>
                    <option value="highSchool">High School</option>
                    <option value="diploma">Diploma</option>
                    <option value="bachelor">Bachelor's Degree</option>
                    <option value="master">Master's Degree</option>
                    <option value="phd">PhD</option>
                </select>
            </div>

            <div id="specialization">
                <label id="specializationLabel">Specialization:</label>
                <div id="options">
                    <div>
                        <input type="checkbox" name="specialization" id="computerScience" value="computerScience">
                        <label for="computerScience">Computer Science</label>
                    </div>

                    <div>
                        <input type="checkbox" name="specialization" id="informationTechnology"
                            value="informationTechnology">
                        <label for="informationTechnology">Information Technology</label>
                    </div>
                    <div>
                        <input type="checkbox" name="specialization" id="computerArchitecture"
                            value="computerArchitecture">
                        <label for="computerArchitecture">Computer Architecture</label>
                    </div>
                    <div>
                        <input type="checkbox" name="specialization" id="teleCommunication" value="teleCommunication">
                        <label for="teleCommunication">Tele Communication</label>
                    </div>
                </div>
            </div>

            <div class="labelInput">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Write Your Password" required>
            </div>

            <div id="registerDiv">
                <button type="submit">Register</button>
                
            </div>
        </form>
    </div>
</body>

</html>
